profile_name: default
version: '1.0'
severity:
  critical: 60.0
  high: 20.0
  medium: 10.0
  low: 3.0
  info: 0.0
repeatability:
  base: 2
  max_value: 5.0
  window_days: 14
context:
  modifiers:
    toner_low:
      threshold: 10.0
      multiplier: 1.5
      applies_to_components:
      - print
      - quality
    drum_high:
      threshold: 90.0
      multiplier: 1.3
      applies_to_components:
      - quality
    fuser_high:
      threshold: 90.0
      multiplier: 1.5
      applies_to_components:
      - fusing
      - jam
    mileage_over_interval:
      threshold: null
      multiplier: 1.2
      applies_to_components:
      - '*'
  max_value: 1.5
age:
  tau_days: 14
  window_days: 30
confidence:
  min_value: 0.2
  penalties:
    rag_not_found: 0.7
    missing_resources: 0.85
    missing_model: 0.6
    abnormal_daily_jump: 0.8
    anomalous_event_count: 0.7
    no_events_and_no_resources: 0.9
zones:
  green_threshold: 75
  red_threshold: 40
critical_per_day_limit: 1
silent_device_mode: data_quality
