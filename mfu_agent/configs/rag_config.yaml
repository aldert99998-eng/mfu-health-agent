embeddings:
  model: "BAAI/bge-m3"
  device: "cuda"
  batch_size: 32
  normalize: true
  max_length: 1024
  fp16: true

reranker:
  model: "BAAI/bge-reranker-v2-m3"
  device: "cuda"
  batch_size: 16
  top_n_input: 30
  top_n_output: 8

hybrid_search:
  use_qdrant_fusion: true
  rrf_k: 60
  dense_weight: 1.0
  sparse_weight: 1.0
  top_k_per_branch: 30

chunking:
  service_manuals:
    strategy: "hierarchical"
    max_tokens: 800
    min_tokens: 200
    overlap_tokens: 100
    use_bookmarks: true
  error_codes:
    strategy: "per_record"
    record_separator: "^Код\\s+[A-Z]\\d+"
  internal_guides:
    strategy: "recursive"
    max_tokens: 500
    overlap_tokens: 80
  parts_catalog:
    strategy: "per_record"

qdrant:
  host: "localhost"
  port: 6333
  grpc_port: 6334
  prefer_grpc: true
  timeout_seconds: 30
  collections:
    - name: "service_manuals"
      dense_size: 1024
      hnsw_m: 16
      hnsw_ef_construct: 200
    - name: "error_codes"
      dense_size: 1024
    - name: "internal_guides"
      dense_size: 1024
    - name: "parts_catalog"
      dense_size: 1024

ingestion:
  pdf_parser: "pymupdf"
  ocr_enabled: false
  llm_enrichment:
    enabled: true
    classify_batch_size: 15
    fallback_content_type: "reference"
  upsert_batch_size: 100

evaluation:
  dataset_path: "configs/eval_dataset.yaml"
  save_history_path: "storage/eval_history/"
  auto_run_on_reindex: true
  acceptance_thresholds:
    recall_at_5: 0.70
    mrr: 0.50

storage:
  uploads_dir: "storage/uploads"
  qdrant_snapshots_dir: "storage/qdrant_snapshots"

pii_filter:
  enabled: true
  patterns:
    - pattern: "\\+7\\s*\\(?\\d{3}\\)?\\s*\\d{3}[- ]?\\d{2}[- ]?\\d{2}"
      replacement: "[PHONE]"
    - pattern: "[\\w.+-]+@[\\w-]+\\.[\\w.-]+"
      replacement: "[EMAIL]"
